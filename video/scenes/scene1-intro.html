<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px;
  height: 1080px;
  background: #09090b;
  font-family: 'Inter', -apple-system, sans-serif;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  text-align: center;
  position: relative;
}

.logo-mark {
  width: 80px;
  height: 80px;
  margin: 0 auto 40px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 60px rgba(99, 102, 241, 0.3);
}

.logo-mark svg {
  width: 48px;
  height: 48px;
}

.title {
  font-size: 72px;
  font-weight: 700;
  color: #fafafa;
  letter-spacing: -2px;
  margin-bottom: 16px;
}

.subtitle {
  font-size: 24px;
  font-weight: 400;
  color: #a1a1aa;
  letter-spacing: 0.5px;
  margin-bottom: 60px;
}

.tagline {
  font-size: 32px;
  font-weight: 500;
  color: #e4e4e7;
  margin-bottom: 80px;
  line-height: 1.4;
}

.tagline span {
  color: #818cf8;
  font-weight: 600;
}

.chain-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 28px;
  background: rgba(99, 102, 241, 0.1);
  border: 1px solid rgba(99, 102, 241, 0.3);
  border-radius: 100px;
  color: #a5b4fc;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

.chain-badge .dot {
  width: 8px;
  height: 8px;
  background: #22c55e;
  border-radius: 50%;
}

/* Background grid */
.bg-grid {
  position: absolute;
  top: 0;
  left: 0;
  width: 1920px;
  height: 1080px;
  background-image:
    linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* Glow orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.4;
}
.orb-1 {
  width: 400px;
  height: 400px;
  background: #6366f1;
  top: -100px;
  right: 200px;
  opacity: 0.15;
}
.orb-2 {
  width: 300px;
  height: 300px;
  background: #8b5cf6;
  bottom: -50px;
  left: 300px;
  opacity: 0.1;
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="container">
  <div class="logo-mark">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 4L4 14v20l20 10 20-10V14L24 4z" stroke="white" stroke-width="2" fill="none"/>
      <path d="M24 14l-10 5v10l10 5 10-5V19l-10-5z" fill="white" opacity="0.9"/>
      <circle cx="24" cy="24" r="4" fill="#6366f1"/>
    </svg>
  </div>

  <h1 class="title">Santiora</h1>
  <p class="subtitle">Fully Autonomous AI Prediction Market</p>

  <p class="tagline">
    Zero human operation. <span>AI creates, resolves, and settles</span><br>
    prediction markets entirely on-chain.
  </p>

  <div class="chain-badge">
    <span class="dot"></span>
    Built on Somnia Agentic L1
  </div>
</div>
</body>
</html>
