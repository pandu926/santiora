<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px;
  height: 1080px;
  background: #09090b;
  font-family: 'Inter', -apple-system, sans-serif;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  text-align: center;
}

.logo-mark {
  width: 72px;
  height: 72px;
  margin: 0 auto 36px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 80px rgba(99, 102, 241, 0.25);
}

.logo-mark svg {
  width: 42px;
  height: 42px;
}

.title {
  font-size: 56px;
  font-weight: 700;
  color: #fafafa;
  letter-spacing: -1.5px;
  margin-bottom: 20px;
}

.tagline {
  font-size: 24px;
  color: #a1a1aa;
  margin-bottom: 48px;
  line-height: 1.5;
}

.tagline span {
  color: #e4e4e7;
  font-weight: 500;
}

.primitives {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 48px;
  flex-wrap: wrap;
}

.primitive-badge {
  padding: 8px 18px;
  background: rgba(99, 102, 241, 0.08);
  border: 1px solid rgba(99, 102, 241, 0.2);
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  color: #a5b4fc;
  font-family: 'JetBrains Mono', monospace;
}

.url {
  font-size: 20px;
  font-weight: 500;
  color: #818cf8;
  margin-bottom: 16px;
  letter-spacing: 0.5px;
}

.chain-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  background: rgba(34, 197, 94, 0.08);
  border: 1px solid rgba(34, 197, 94, 0.25);
  border-radius: 100px;
  color: #86efac;
  font-size: 14px;
  font-weight: 500;
}

.chain-badge .dot {
  width: 8px;
  height: 8px;
  background: #22c55e;
  border-radius: 50%;
}

.bg-grid {
  position: absolute;
  top: 0; left: 0;
  width: 1920px; height: 1080px;
  background-image:
    linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
}
.orb-1 {
  width: 500px; height: 500px;
  background: #6366f1;
  top: -150px; right: 100px;
  opacity: 0.1;
}
.orb-2 {
  width: 400px; height: 400px;
  background: #8b5cf6;
  bottom: -100px; left: 200px;
  opacity: 0.08;
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="container">
  <div class="logo-mark">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 4L4 14v20l20 10 20-10V14L24 4z" stroke="white" stroke-width="2" fill="none"/>
      <path d="M24 14l-10 5v10l10 5 10-5V19l-10-5z" fill="white" opacity="0.9"/>
      <circle cx="24" cy="24" r="4" fill="#6366f1"/>
    </svg>
  </div>

  <h1 class="title">Santiora</h1>

  <p class="tagline">
    <span>Zero human operation.</span> AI creates, resolves, and settles<br>
    prediction markets — natively on Somnia Agentic L1.
  </p>

  <div class="primitives">
    <span class="primitive-badge">inferToolsChat</span>
    <span class="primitive-badge">scheduleSubscriptionAtBlock</span>
    <span class="primitive-badge">Agent-to-Agent</span>
    <span class="primitive-badge">Native Reactivity</span>
  </div>

  <div class="url">santiora.rbexp.com</div>

  <div class="chain-badge">
    <span class="dot"></span>
    The future of autonomous DeFi starts here
  </div>
</div>
</body>
</html>
