      - paragraph [ref=e205]:
        - text: Somnia Agents are invoked via
        - strong [ref=e206]: HTTP POST requests
        - text: ", where both the input data and returned result are ABI-encoded, just like traditional Ethereum smart contract calls."
      - paragraph [ref=e207]:
        - text: The interface and schema of each Agent closely follows the
        - strong [ref=e208]: standard Solidity contract ABI
        - text: . This means you can use familiar web3 tools—such as viem, Ethers.js, or Solidity's own ABI encoders/decoders—to interact with Agents in exactly the same way you would a smart contract.
