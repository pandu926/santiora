      - paragraph [ref=e190]:
        - text: Invoking an Agent requires
        - strong [ref=e191]: SOMI
        - text: (mainnet) or
        - strong [ref=e192]: STT
        - text: "(testnet). Users send a deposit when creating a request. The contract splits it into two pots: an"
        - strong [ref=e193]: operations reserve
        - text: (
        - code [ref=e194]: minPerAgentDeposit × subcommitteeSize
        - text: ) that funds runner gas refunds, callback gas, and keeper payments; and an
        - strong [ref=e195]: agent reward pot
        - text: (everything above the reserve) that's split equally and paid to every elected subcommittee member at finalisation. Whatever's left after everything settles is rebated to the requester.
      - paragraph [ref=e196]:
        - text: See
        - link "Gas Fees" [ref=e198] [cursor=pointer]:
          - /url: /agents/invoking-agents/gas-fees
        - text: for the full fund-flow diagram and details on sizing deposits.
