      - heading "Direct link to heading Vision" [level=3] [ref=e90]:
        - link "Direct link to heading" [ref=e92] [cursor=pointer]:
          - /url: "#vision"
          - img [ref=e93]
        - generic [ref=e95]: Vision
      - paragraph [ref=e96]: Smart contracts revolutionized trustless computation, but they operate in isolation. They cannot fetch external data, call APIs, or perform complex computation. Today's solutions require stitching together multiple systems—Chainlink for price feeds, separate oracle networks for weather data, centralized services for AI—each adding counterparty risk and integration complexity.
      - paragraph [ref=e97]: What if smart contracts could natively access the internet, run AI models, and perform arbitrary computation—all while maintaining blockchain guarantees of decentralization and auditability?
      - paragraph [ref=e98]: Somnia Agents extend the Somnia blockchain by enabling Smart Contracts and users to trigger decentralized, auditable compute jobs—including LLM-based tasks—executed across Somnia's decentralized network. By integrating with Somnia's native on-chain reactivity, Agents make it possible to build and run fully featured decentralized applications.
      - heading "Direct link to heading What are Somnia Agents?" [level=3] [ref=e99]:
        - link "Direct link to heading" [ref=e101] [cursor=pointer]:
          - /url: "#what-are-somnia-agents"
          - img [ref=e102]
        - generic [ref=e104]: What are Somnia Agents?
      - paragraph [ref=e105]:
        - text: Somnia Agents function as
        - strong [ref=e106]: decentralized, sandboxed compute containers
        - text: . This architecture makes them simple to develop, much like familiar serverless platforms such as AWS Lambda or Google Cloud Run, but with the advantages of blockchain auditability, reactivity, and security.
      - heading "Direct link to heading Capabilities" [level=4] [ref=e107]:
        - link "Direct link to heading" [ref=e109] [cursor=pointer]:
          - /url: "#capabilities"
          - img [ref=e110]
