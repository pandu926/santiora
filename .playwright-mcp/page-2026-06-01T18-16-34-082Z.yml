      - paragraph [ref=e153]:
        - text: When an Agent is invoked, it runs on a
        - strong [ref=e154]: decentralized subset of the Somnia network nodes
        - text: . Execution is considered valid only when a majority of nodes reach consensus on the result. Each invocation produces an audit receipt, allowing anyone to retrospectively inspect each step in an Agent execution.
      - heading "Direct link to heading Deterministic LLMs" [level=4] [ref=e155]:
        - link "Direct link to heading" [ref=e157] [cursor=pointer]:
          - /url: "#deterministic-llms"
          - img [ref=e158]
        - generic [ref=e160]: Deterministic LLMs
      - paragraph [ref=e161]:
        - text: Somnia Agents can invoke large language models (LLMs) that run as part of the validator network. Unlike traditional LLM APIs where outputs vary between calls, Somnia's LLMs use fixed random seeds and controlled temperature parameters to produce
        - strong [ref=e162]: deterministic outputs
        - text: —the same input always yields the same output across all validating nodes.
      - paragraph [ref=e163]: "This determinism enables consensus: when multiple nodes independently run the same LLM inference with identical parameters, they produce identical results, allowing the network to verify and agree on AI-generated outputs."
      - paragraph [ref=e164]:
        - text: See
        - link "LLM Inference" [ref=e166] [cursor=pointer]:
          - /url: /agents/base-agents/llm-inference
        - text: for usage details.
      - heading "Direct link to heading Receipts" [level=4] [ref=e167]:
        - link "Direct link to heading" [ref=e169] [cursor=pointer]:
          - /url: "#receipts"
          - img [ref=e170]
        - generic [ref=e172]: Receipts
      - paragraph [ref=e173]:
        - text: An execution receipt is a
        - strong [ref=e174]: signed manifest of intermediate computation steps
        - text: taken within the Agent. This is similar to the logs and manifests used by CI build systems.
      - paragraph [ref=e175]:
        - strong [ref=e176]: "Important:"
        - text: The final
        - strong [ref=e177]: result
        - text: is what validators reach consensus on. Receipt steps are
        - strong [ref=e178]: subjective
        - text: —they show what one node did to compute the result, which may vary slightly between nodes. This provides transparency without requiring consensus on every intermediate step.
